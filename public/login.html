<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ArtVerse</title>
  <meta name="description" content="Login to ArtVerse and explore virtual art & photography exhibitions." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="logo-icon">🎨</div>
      ArtVerse
    </a>
    <div class="nav-actions">
      <span style="color:var(--text-muted); font-size:0.875rem;">Don't have an account?</span>
      <a href="/register" class="btn btn-primary btn-sm">Join Free</a>
    </div>
  </div>
</nav>

<div id="toast-container"></div>

<div class="auth-page">
  <div class="auth-glow"></div>
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon">🎨</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your ArtVerse account</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input type="password" id="login-password" class="form-control" placeholder="Your password" required />
      </div>

      <div id="login-error" style="color: var(--accent-rose); font-size: 0.85rem; margin-bottom: 1rem; display:none;"></div>

      <button type="submit" class="btn btn-primary" style="width:100%;" id="login-btn">
        Sign In
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <p style="text-align:center; font-size:0.875rem; color:var(--text-muted);">
      New to ArtVerse?
      <a href="/register" style="color:var(--accent-violet-light); font-weight:600;">Create an account →</a>
    </p>

    <!-- Admin hint -->
    <div style="margin-top:1.5rem; padding:0.75rem 1rem; background:rgba(245,158,11,0.06); border:1px solid rgba(245,158,11,0.15); border-radius:var(--radius-sm);">
      <p style="font-size:0.75rem; color:var(--accent-gold); font-weight:600; margin-bottom:2px;">🔑 Admin Access</p>
      <p style="font-size:0.72rem; color:var(--text-muted);">Use admin credentials set in the database. First register then manually set role to 'admin' in MongoDB.</p>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
