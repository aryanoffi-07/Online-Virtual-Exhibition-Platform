<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — ArtVerse</title>
  <meta name="description" content="Manage your ArtVerse profile and exhibits." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="logo-icon">🎨</div>
      ArtVerse
    </a>
    <ul class="nav-links">
      <li><a href="/">Gallery</a></li>
    </ul>
    <div class="nav-actions">
      <div class="nav-user" id="nav-user"></div>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Logout</button>
    </div>
  </div>
</nav>

<div id="toast-container"></div>

<div class="page-container">

  <!-- Profile Header -->
  <div class="profile-header" id="profile-header">
    <div class="loading-overlay" style="padding:2rem;"><div class="spinner"></div></div>
  </div>

  <!-- Main Content -->
  <div class="two-col" style="align-items:start;">

    <!-- Left: Edit Profile -->
    <div>
      <div class="card" style="padding:1.75rem; margin-bottom:1.5rem;">
        <h3 style="margin-bottom:1.25rem;">✏️ Edit Profile</h3>
        <form id="profile-form">
          <div class="form-group">
            <label class="form-label" for="p-name">Display Name</label>
            <input type="text" id="p-name" class="form-control" placeholder="Your name" />
          </div>
          <div class="form-group">
            <label class="form-label" for="p-bio">Bio</label>
            <textarea id="p-bio" class="form-control" rows="3" placeholder="Tell the world about yourself..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="p-pic">Profile Picture URL</label>
            <input type="url" id="p-pic" class="form-control" placeholder="https://..." />
          </div>
          <button type="submit" class="btn btn-primary" id="profile-save-btn">Save Changes</button>
        </form>
      </div>

      <!-- Upload Exhibit (creator only) -->
      <div class="card" style="padding:1.75rem;" id="upload-section" hidden>
        <h3 style="margin-bottom:1.25rem;">🖼️ Upload New Exhibit</h3>
        <form id="upload-form">
          <div class="form-group">
            <label class="form-label" for="u-title">Title</label>
            <input type="text" id="u-title" class="form-control" placeholder="Artwork title" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="u-desc">Description</label>
            <textarea id="u-desc" class="form-control" rows="3" placeholder="Describe your work..." required></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="u-category">Category</label>
            <select id="u-category" class="form-control" required>
              <option value="">— Select Category —</option>
              <option value="Art">🎨 Art</option>
              <option value="Photography">📷 Photography</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Media Source</label>
            <div style="display:flex; gap:1.5rem; margin-bottom:0.75rem;">
              <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                <input type="radio" name="mediaSource" value="link" checked /> Link URL
              </label>
              <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                <input type="radio" name="mediaSource" value="upload" /> Upload Image
              </label>
            </div>
            <div id="source-link">
              <input type="url" id="u-medialink" class="form-control" placeholder="https://..." />
              <p class="form-hint">Paste a direct link to your image or video.</p>
            </div>
            <div id="source-upload" style="display:none;">
              <input type="file" id="u-mediafile" class="form-control" accept="image/*" />
              <p class="form-hint">Max file size: 5MB.</p>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="u-mediatype">Media Type</label>
            <select id="u-mediatype" class="form-control">
              <option value="image">📷 Image</option>
              <option value="video">🎬 Video</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="u-tags">Tags (comma-separated)</label>
            <input type="text" id="u-tags" class="form-control" placeholder="abstract, portrait, nature..." />
          </div>

          <!-- Media Preview -->
          <div id="media-preview" style="margin-bottom:1rem; display:none;">
            <label class="form-label">Preview</label>
            <img id="preview-img" style="width:100%; border-radius:var(--radius-md); border:1px solid var(--border-glass); max-height:250px; object-fit:cover;" />
            <video id="preview-vid" controls style="width:100%; border-radius:var(--radius-md); border:1px solid var(--border-glass); display:none;"></video>
          </div>

          <button type="submit" class="btn btn-gold" id="upload-btn">Submit Exhibit</button>
          <p class="form-hint" style="margin-top:0.75rem;">⏳ Submissions are reviewed by admin before publishing.</p>
        </form>
      </div>
    </div>

    <!-- Right: My Exhibits -->
    <div>
      <div class="section-header">
        <h3>My Exhibits</h3>
        <span id="my-exhibit-count" style="color:var(--text-muted); font-size:0.875rem;"></span>
      </div>
      <div id="my-exhibits">
        <div class="loading-overlay"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
