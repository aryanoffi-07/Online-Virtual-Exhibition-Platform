<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ArtVerse</title>
  <meta name="description" content="Join ArtVerse as an artist, photographer, or visitor and explore virtual exhibitions." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="logo-icon">🎨</div>
      ArtVerse
    </a>
    <div class="nav-actions">
      <span style="color:var(--text-muted); font-size:0.875rem;">Already have an account?</span>
      <a href="/login" class="btn btn-outline btn-sm">Sign In</a>
    </div>
  </div>
</nav>

<div id="toast-container"></div>

<div class="auth-page" style="padding: 2rem 1rem;">
  <div class="auth-glow"></div>
  <div class="auth-box" style="max-width:520px;">
    <div class="auth-logo">
      <div class="logo-icon">✨</div>
      <h2>Create Account</h2>
      <p>Join the ArtVerse community</p>
    </div>

    <!-- Role Selection -->
    <div class="form-group">
      <label class="form-label">I am a...</label>
      <div class="role-selector">
        <div class="role-option">
          <input type="radio" name="role" id="role-visitor" value="visitor" checked />
          <label for="role-visitor">
            <span class="role-icon">👁️</span>
            <span class="role-name">Visitor</span>
            <span class="role-desc">Browse & interact with exhibits</span>
          </label>
        </div>
        <div class="role-option">
          <input type="radio" name="role" id="role-creator" value="creator" />
          <label for="role-creator">
            <span class="role-icon">🎨</span>
            <span class="role-name">Creator</span>
            <span class="role-desc">Artist or Photographer — upload exhibits</span>
          </label>
        </div>
      </div>
    </div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label" for="reg-name">Full Name</label>
        <input type="text" id="reg-name" class="form-control" placeholder="Your full name" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Email Address</label>
        <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters" required minlength="6" />
      </div>

      <div id="reg-error" style="color: var(--accent-rose); font-size: 0.85rem; margin-bottom: 1rem; display:none;"></div>

      <button type="submit" class="btn btn-primary" style="width:100%;" id="reg-btn">
        Create Account
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>
    <p style="text-align:center; font-size:0.875rem; color:var(--text-muted);">
      Already have an account?
      <a href="/login" style="color:var(--accent-violet-light); font-weight:600;">Sign in →</a>
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
